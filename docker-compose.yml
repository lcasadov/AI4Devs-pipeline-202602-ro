services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - pgdata:/var/lib/postgresql/data       # <-- persistencia de datos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy            # espera a que Postgres esté listo
    environment:
      # El host es "db" (nombre del servicio), NO localhost
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      PORT: 3010
    ports:
      - "3010:3010"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: /api
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
