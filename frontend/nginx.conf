server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enrutado de la SPA: cualquier ruta cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Las llamadas a /api/... se reenvían al contenedor del backend.
    # La barra final en proxy_pass elimina el prefijo /api/
    # (ej: /api/candidates  ->  backend recibe /candidates)
    location /api/ {
        proxy_pass http://backend:3010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
